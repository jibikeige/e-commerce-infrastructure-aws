apiVersion: v1
kind: Service
metadata:
  name: trip-service
  namespace: rideshare-prod
spec:
  type: ClusterIP   # Only accessible within the cluster
  selector:
    app: trip-service
  ports:
    - protocol: TCP
      port: 3006       # The port other pods/services will use to reach this service
      targetPort: 3006 # The port your container is listening on