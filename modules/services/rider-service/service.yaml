apiVersion: v1
kind: Service
metadata:
  name: rideshare-service
spec:
  type: ClusterIP   # Only accessible within the cluster
  selector:
    app: rideshare-service
  ports:
    - protocol: TCP
      port: 3000      # The port other pods/services will use to reach this service
      targetPort: 3000 # The port your container is listening on