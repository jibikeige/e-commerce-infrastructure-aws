apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rideshare-driver-service-hpa
  namespace: rideshare-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rideshare-driver
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50