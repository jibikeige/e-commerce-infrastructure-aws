apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 221693237976.dkr.ecr.us-east-2.amazonaws.com/jibike_rideshare_rider_service:rideshare-frontend-v0.10
          imagePullPolicy: Always
          ports:
            - containerPort: 3003
          env:
            - name: SENDER_EMAIL
              value: "DoNotReply@9929ee47-d7de-4494-8bec-adfce9d03cde.azurecomm.net"
            - name: AZURE_EMAIL_CONNECTION_STRING
              value: ""
            - name: HOST
              value: "0.0.0.0"
          envFrom:
            - configMapRef:
                name: nextjs-runtime-config
            - secretRef:
                name: rideshare-secrets