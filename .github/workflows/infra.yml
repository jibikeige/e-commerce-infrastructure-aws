name: "e-commerce-infrastructure-aws infrastructure"

on:
  workflow_dispatch:
    inputs:
      terraform_folder:
        description: "Select Terraform folder to deploy"
        required: true
        type: choice
        options:
          - vpc
          - eks
          - ec2
          - rds
          - redis
          - s3

      action:
        description: "Select action"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

      environment:
        description: "Select action"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  aws-auth:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 #v6
        with:
          role-to-assume: arn:aws:iam::221693237976:role/github-actions-oidc-jibike
          aws-region: us-east-2

      - name: Test AWS Access
        run: aws sts get-caller-identity